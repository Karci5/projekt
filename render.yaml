services:
  - type: web
    name: projekt-backend-6j83
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start

  - type: web
    name: projekt-frontend-05yt
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
